; www.conf - PHP-FPM pool tuning.
;
; PHP is the scarce resource: every cache MISS costs one busy worker for the
; duration of a full page render. The cache exists precisely so that this pool
; stays small and almost idle even under heavy traffic. Sizing it is about the
; *miss* rate, not the request rate.

[www]
user  = www-data
group = www-data
listen = 9000

; ---- process manager -----------------------------------------------------
; "dynamic": keep a warm baseline of idle workers for instant response, scale
; up to a hard ceiling under load. max_children is bounded by RAM:
;   max_children = free_RAM_for_PHP / avg_worker_RSS  (roughly)
; Oversizing it just trades a fast 503 for a slow swap-death under a traffic
; spike - a smaller, predictable ceiling sheds load gracefully instead.
pm                   = dynamic
pm.max_children      = 30
pm.start_servers     = 6
pm.min_spare_servers = 4
pm.max_spare_servers = 12

; recycle workers periodically to cap the blast radius of any per-request leak
pm.max_requests      = 5000
pm.process_idle_timeout = 10s

; ---- observability -------------------------------------------------------
pm.status_path = /_fpm_status
request_slowlog_timeout = 5s
slowlog = /var/log/php/slow.log

; ---- OPcache lives in php.ini, but it is half the story: with OPcache warm,
; PHP never re-parses/compiles the app on a miss. Pair this pool with:
;   opcache.enable=1  opcache.memory_consumption=192
;   opcache.validate_timestamps=0   (in prod; flush on deploy)
