# nginx.conf - front-tier reverse proxy + full-page cache.
# Tuned for a high-request-rate, mostly-anonymous read workload on a small box.
# Requires an nginx build with the srcache / redis2 / set-misc / headers-more
# modules (the bundled docker image is OpenResty, which ships them by default).

user  nginx;
worker_processes        auto;   # one worker per core
worker_cpu_affinity     auto;   # pin workers to cores, reduce cache-line bounce
worker_rlimit_nofile    65535;
pcre_jit                on;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
    accept_mutex        off;    # let the kernel (SO_REUSEPORT/epoll) balance
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---- connection handling -------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   8;       # short: clients are many and transient
    reset_timedout_connection on;
    server_tokens       off;
    aio                 threads;

    # ---- a log line that records the cache decision --------------------------
    # $srcache_fetch_status is HIT / MISS / BYPASS - this single field is how
    # you actually measure whether the cache is doing its job in production.
    log_format cache '$remote_addr $upstream_response_time $srcache_fetch_status '
                     '[$time_local] "$request" $status $body_bytes_sent';
    access_log  /var/log/nginx/access.log cache buffer=64k flush=5s;
    error_log   /var/log/nginx/error.log warn;

    # ---- compression ---------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/rss+xml image/svg+xml;

    # ---- modest, abusive-client rate limiting --------------------------------
    # Generous for humans, enough to blunt a single hot IP hammering PHP.
    limit_req_zone $binary_remote_addr zone=dynamic:10m rate=10r/s;

    include /etc/nginx/conf.d/*.conf;   # cache-map.conf, upstream.conf
    include /etc/nginx/sites/*.conf;    # wordpress.conf
}
