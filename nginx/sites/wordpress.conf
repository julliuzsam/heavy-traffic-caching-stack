# wordpress.conf - the request pipeline.
#
# Flow for a normal page view:
#   request --> $skip_cache?
#                 |
#         no (anonymous read)            yes (logged-in / cart / admin / XHR)
#                 |                                   |
#         srcache_fetch from Redis            skip fetch + skip store
#                 |  HIT  -> return bytes, PHP never runs
#                 |  MISS -> run PHP, srcache_store the result, set TTL
#                 v                                   v
#            FULL-PAGE CACHE                     LIVE APPLICATION
#
# The win is structural: at a ~97% hit ratio, ~97% of dynamic-looking traffic
# never reaches PHP or the database at all - but the 3% that genuinely needs
# to be live (comments, sessions, carts) always is.
#
# Two design decisions in here matter more than they look:
#   1. FAIL OPEN. If Redis is slow or down, the cache must degrade to "render
#      live", never to an error page. srcache already treats a failed fetch as a
#      MISS; we add short Redis timeouts (see upstream.conf) so a sick cache
#      fails *fast* to PHP instead of hanging the request.
#   2. TTL JITTER. Every stored page gets a randomised TTL, not a fixed one, so
#      a million keys created during a traffic spike don't all expire in the
#      same second and stampede PHP. See $exp below.

server {
    listen 80 default_server reuseport;
    server_name _;
    root /var/www/html;
    index index.php;

    # Cache key. Scheme+method+host+uri only - deliberately NOT the cookie or
    # full query string: personalised requests are excluded upstream by
    # $skip_cache, so the key space stays small and the hit ratio stays high.
    set $redis_key "fullpage:$scheme$request_method$host$request_uri";

    # internal endpoints used by srcache to talk to Redis -------------------
    location = /_redis_fetch {
        internal;
        set $redis_key $args;
        redis_pass redis_cache;
    }
    location = /_redis_store {
        internal;
        set_unescape_uri $exp $arg_exp;
        set_unescape_uri $key $arg_key;
        redis2_query set $key $echo_request_body;
        redis2_query expire $key $exp;
        redis2_pass redis_cache;
    }

    # static assets: let nginx serve them straight from disk, long max-age ---
    location ~* \.(?:css|js|jpe?g|png|gif|webp|avif|svg|woff2?|ico|mp4)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # served when the backend is fully down - a branded static page beats a
    # raw 502. Anonymous hot pages still serve from Redis even while PHP is out.
    location = /_offline.html { internal; root /etc/nginx/html; }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # only PHP gets rate-limited; cached hits are free
        limit_req zone=dynamic burst=20 nodelay;

        # ---- full-page cache via srcache ---------------------------------
        # TTL jitter: 4h give or take ~5min. set_random (ngx_set_misc) de-syncs
        # mass expiry so hot keys don't all lapse together and stampede PHP.
        set_random $exp 13800 15000;
        set_escape_uri $escaped_key $redis_key;
        srcache_fetch_skip $skip_cache;
        srcache_store_skip $skip_cache;
        srcache_fetch GET /_redis_fetch $redis_key;
        srcache_store PUT /_redis_store key=$escaped_key&exp=$exp;
        srcache_response_cache_control off;
        # only store cacheable, successful responses (never a 500/redirect)
        srcache_store_statuses 200 301 302 404;

        # surface the decision so it is observable from curl -I and in logs
        add_header X-Cache-Status $srcache_fetch_status;

        # ---- graceful degradation ----------------------------------------
        # If PHP is saturated or down, serve the static offline page instead
        # of leaking a raw gateway error to the visitor.
        fastcgi_intercept_errors on;
        error_page 502 503 504 =503 /_offline.html;

        fastcgi_pass php_app;
        fastcgi_read_timeout 300;
        fastcgi_next_upstream error timeout http_500;
    }

    # ---- monitoring surface (private) ------------------------------------
    # Scraped by the metrics stack; never exposed publicly. See docs/observability.md
    location = /_fpm_status  { access_log off; allow 127.0.0.1; deny all; fastcgi_pass php_app; include fastcgi_params; }
    location = /_nginx_status { access_log off; allow 127.0.0.1; deny all; stub_status; }
}
