<!DOCTYPE html>
<!--
  Static fallback served by nginx (error_page) when the PHP backend is fully
  unavailable. It is plain HTML with zero backend dependencies, so it renders
  even when everything behind nginx is down. Anonymous hot pages continue to
  serve from the Redis full-page cache; only uncached/dynamic requests land here.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Back in a moment</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
         display:flex;min-height:100vh;margin:0;align-items:center;
         justify-content:center;background:#0f1115;color:#e6e6e6}
    .card{max-width:30rem;padding:2rem;text-align:center}
    h1{font-size:1.4rem;margin:0 0 .5rem}
    p{color:#9aa0a6;line-height:1.5}
  </style>
</head>
<body>
  <div class="card">
    <h1>We'll be right back</h1>
    <p>This page is briefly unavailable while the service recovers.
       Please refresh in a few seconds.</p>
  </div>
</body>
</html>
