# ---------------------------------------------------------------------------
# cache-map.conf - decide, per request, whether the response may be served
# from (or stored in) the full-page cache.
#
# This is the heart of a *hybrid* cache. The goal is NOT "cache everything".
# The goal is: serve anonymous, idempotent reads from cache at a very high
# hit ratio, while every personalised or state-changing request bypasses the
# cache entirely and is rendered live by the application.
#
# Each map below sets a partial flag. They are combined at the bottom into a
# single $skip_cache variable. $skip_cache = 0  -> cacheable.
#                              $skip_cache = 1  -> always live (bypass + no store).
# ---------------------------------------------------------------------------

# 1. AJAX / XHR requests are almost always dynamic fragments -> never cache.
map $http_x_requested_with $xhr_no_cache {
    default          0;
    XMLHttpRequest   1;
}

# 2. Any request carrying an Authorization header is, by definition, scoped to
#    a principal -> never cache.
map $http_authorization $auth_no_cache {
    default 1;
    ""      0;
}

# 3. Session / state cookies. The presence of any of these means the response
#    is personalised (logged in, mid-checkout, has a comment identity, etc.).
#    These are the cookies that MUST keep a request dynamic.
map $http_cookie $cookie_no_cache {
    default                          0;
    "~*sessionid"                    1;   # generic app session
    "~*_logged_in"                   1;   # authenticated user
    "~*_no_cache"                    1;   # explicit opt-out flag
    "~*comment_author"               1;   # commenter identity (live comments)
    "~*items_in_cart"                1;   # non-empty cart
    "~*cart_hash"                    1;   # cart fingerprint
    "~*postpass"                     1;   # password-protected content
}

# 4. URI namespaces that are inherently dynamic or private. Anything that
#    mutates state or renders per-user output lives here.
map $request_uri $uri_no_cache {
    default                          0;
    "~*/admin/"                      1;   # back office
    "~*/account/"                    1;   # user account area
    "~*/cart/"                       1;
    "~*/checkout/"                   1;
    "~*/login/"                      1;
    "~*/logout/"                     1;
    "~*/lost-password/"              1;
    "~*/reset-password/"             1;
    "~*/api/"                        1;   # JSON endpoints
    "~*/feed/"                       1;   # syndication, cheap to regen
    "~*/sitemap(_index)?\.xml"       1;   # generated on demand
    "~*\.serviceworker"              1;
}

# 5. Query strings. By default a query string makes a URL non-cacheable
#    (infinite key space, often personalised). The exception: known marketing
#    attribution params that do NOT change the rendered HTML - we strip those
#    from the decision so the canonical page still serves from cache.
map $is_args $has_query {
    default 1;
    ""      0;
}
map $args $query_is_attribution_only {
    default     0;
    "~*^(utm_|fbclid|gclid)" 1;
}
# has_query=1 AND attribution-only=1  -> treat as cacheable (00)
# has_query=1 AND not attribution     -> non-cacheable (10 -> 1)
map $has_query$query_is_attribution_only $query_no_cache {
    default 1;
    "00"    0;
    "11"    0;
}

# ---------------------------------------------------------------------------
# Final decision. Concatenate every flag; only the all-zero combination is
# cacheable. Any single "1" forces the request live.
# ---------------------------------------------------------------------------
map $xhr_no_cache$auth_no_cache$cookie_no_cache$uri_no_cache$query_no_cache $skip_cache {
    default 1;
    "00000" 0;
}
