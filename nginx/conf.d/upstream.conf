# PHP-FPM application upstream. A unix socket would shave a little syscall
# overhead on a single host; we use TCP here so the same config works whether
# PHP runs in a sibling container, another node, or behind a pool of workers.
upstream php_app {
    server php:9000 max_fails=3 fail_timeout=15s;
    keepalive 16;            # reuse FastCGI connections, avoid per-request setup
}

# Redis, used as the full-page response store via the ngx_srcache + ngx_redis2
# modules. Kept as an upstream so connections are pooled and the store/fetch
# subrequests reuse them.
#
# Resilience note: the cache is on the *fast path* of every request, so it must
# never be allowed to slow the site down. With short connect/read timeouts a
# degraded Redis fails over to a live PHP render in milliseconds (fail-open)
# rather than hanging the request - a slow cache is worse than no cache.
upstream redis_cache {
    server redis:6379 max_fails=2 fail_timeout=10s;
    keepalive 32;
}
