# redis.conf - Redis as a full-page + object cache (a cache, not a database).
#
# Design intent: this instance is disposable. Everything in it can be
# regenerated by the application, so we optimise purely for throughput and
# bounded memory, and we deliberately turn OFF every durability feature.

# Bind to the container network only; never expose Redis to the internet.
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 4096          # match a high new-connection rate

# ---- memory bound + eviction --------------------------------------------
# Hard cap so the cache can never push the box into swap. allkeys-lru lets
# Redis evict the coldest entries automatically - the cache stays "hot" and
# self-trimming without any manual key management.
maxmemory 1536mb
maxmemory-policy allkeys-lru

# ---- durability: intentionally disabled ---------------------------------
# No RDB snapshots, no AOF. A cache does not need to survive a restart; paying
# fork()/fsync() costs for data we can rebuild for free would only add latency
# and I/O. If the process dies, it warms back up from application renders.
save ""
appendonly no

# ---- misc ---------------------------------------------------------------
timeout 0
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
